# PrntBtlr — Docker Compose deployment.
#
# Two realistic ways to run this:
#
#  A) Panel only (recommended with Docker): the container is the control panel
#     and talks to a CUPS daemon running on the host. Set CUPS_SERVER so the
#     bundled lpstat/lpadmin reach the host's cupsd, and share the scan folder.
#
#  B) Self-contained: also run a CUPS daemon and pass through the USB printer.
#     That needs device access (uncomment the `devices:` block) and host CUPS
#     disabled to avoid a port clash. Button scanning (scanbd) still belongs on
#     the host — Docker is awkward for udev button events.
#
# Build & run:  docker compose -f deploy/docker-compose.yml up -d --build

services:
  prntbtlr:
    # Use the pre-built image from GHCR instead of building locally by replacing
    # the `build:` block below with:
    #   image: ghcr.io/w0rkingchr1s/prntbtlr:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: prntbtlr
    restart: unless-stopped
    # host networking lets the panel bind :80 and reach a host CUPS on :631.
    network_mode: host
    environment:
      PRNTBTLR_PORT: "80"
      PRNTBTLR_SCAN_DIR: "/srv/scans"
      # Point the bundled CUPS client tools at the host daemon.
      CUPS_SERVER: "127.0.0.1"
    volumes:
      # Share the scan library with the host (and your Samba share).
      - /srv/scans:/srv/scans
      # Option B: expose the host CUPS socket instead of CUPS_SERVER.
      # - /run/cups/cups.sock:/run/cups/cups.sock
    # Option B: pass through the USB printer/scanner for in-container scanning.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
