# PrntBtlr — ready-to-use scanbd action config for Canon PIXMA scanners.
#
# Unlike most scanners, the pixma backend exposes its buttons under well-known
# names, so there is no per-device "discover the button name" step. Press SCAN
# on a PIXMA MFP (e.g. the MX870), pick "PC / save" as the on-device target, and
# `button-1` fires; the second task button fires `button-2`.
#
# scripts/install.sh drops this file into /etc/scanbd/scanner.d/ and makes sure
# scanbd.conf pulls it in (via an `include(...)`), so button scanning works out
# of the box — no hand-editing required.
#
# Not a PIXMA? Use config/scanbd-action.conf instead and discover the button
# name by hand (see the comments there).

device prntbtlr_pixma {
    # Match any pixma device string: pixma:MX870_1A2B3C, pixma, …
    filter = "^pixma.*"
    desc   = "Canon PIXMA (PrntBtlr)"

    # Expose the on-device selection to the scripts (shows up in the logs).
    function target {
        filter = ".*target.*"
        desc   = "Scan target selected on the device"
        env    = "SCANBD_TARGET"
    }

    # First task button → plain PDF into the shared folder.
    action scan2pdf {
        filter = ".*button-1.*"
        desc   = "PrntBtlr: scan to PDF"
        script = "/etc/scanbd/scripts/scan2pdf.sh"
    }

    # Second task button → searchable (OCR) PDF. Falls back to a plain scan when
    # ocrmypdf isn't installed (enable it with ENABLE_OCR=1 ./scripts/install.sh).
    action scan2pdf_ocr {
        filter = ".*button-2.*"
        desc   = "PrntBtlr: scan to searchable PDF"
        script = "/etc/scanbd/scripts/scan2pdf-ocr.sh"
    }
}
