# PrntBtlr — example scanbd action block.
#
# scanbd's button name is hardware-specific and CANNOT be guessed. Discover it:
#
#   sudo systemctl stop scanbd
#   sudo scanbd -f            # foreground/debug
#   # press the scan button on the printer; note the firing option name
#   # (e.g. 'scan', 'button-1') and the value change (usually 0 -> 1)
#   # Ctrl+C to stop, then restart the service.
#
# Then paste a block like this into the appropriate scope of
# /etc/scanbd/scanbd.conf (usually inside `global { ... }`, next to the example
# actions) and replace <BUTTON_NAME> with what you found.

action scan2pdf {
    filter = "^<BUTTON_NAME>$"
    numerical-trigger {
        from-value = 0
        to-value   = 1
    }
    desc   = "PrntBtlr: scan to PDF"
    script = "scan2pdf.sh"
}
