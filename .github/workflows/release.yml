name: Release

# Publish a GitHub Release and a multi-arch container image to GHCR whenever a
# version tag is pushed. Releases are the ONLY distribution channel — the
# panel's self-updater feeds from them. Two channels:
#
#   Beta:    git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1
#            → GitHub *pre-release* + image tags :0.2.0-beta.1 and :beta
#   Stable:  git tag v0.2.0 && git push origin v0.2.0
#            → GitHub release + image tags :0.2.0, :0.2, :stable and :latest
#
# After every beta this workflow dispatches promote.yml, which cuts the stable
# release automatically once 4 positive betas have shipped since the last
# stable one (a beta is "positive" unless its release is marked [failed]).
# A stable release can also be cut earlier — run promote.yml manually with
# force=true, or push a stable tag by hand.

on:
  push:
    tags: ["v*"]
  # promote.yml re-runs this workflow on the stable tag it creates (a tag
  # pushed with GITHUB_TOKEN doesn't fire the push trigger above).
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

env:
  IMAGE: ghcr.io/w0rkingchr1s/prntbtlr

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Detect release channel
        id: channel
        run: |
          if [[ "$GITHUB_REF_NAME" == *-beta.* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest=auto adds :latest only for non-prerelease semver tags, and the
      # {{major}}.{{minor}} pattern is skipped for pre-releases automatically.
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/') && steps.channel.outputs.channel == 'beta' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') && steps.channel.outputs.channel == 'stable' }}
            type=sha

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          base="${version%-beta.*}"
          extract() {
            awk -v v="$1" '
              $0 ~ "^## \\[" v "\\]" {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md
          }
          # Betas usually ship before the CHANGELOG section is finalised — fall
          # back to the base version's section, then to a generic pointer.
          extract "$version" > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || extract "$base" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md)." > RELEASE_NOTES.md
          fi
          {
            echo
            echo "### Container image"
            echo '```'
            echo "docker pull ${IMAGE}:${version}"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          prerelease: ${{ steps.channel.outputs.channel == 'beta' }}

  # Every published beta kicks the promotion counter: the 4th positive beta
  # since the last stable release triggers the stable release automatically.
  promote-check:
    needs: release
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-beta.')
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch the promote workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run promote.yml -R "$GITHUB_REPOSITORY"
