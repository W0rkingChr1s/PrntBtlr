name: Release

# Publish a GitHub Release and a multi-arch container image to GHCR whenever a
# version tag is pushed:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The image lands at ghcr.io/w0rkingchr1s/prntbtlr:<version> (+ :latest).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

env:
  IMAGE: ghcr.io/w0rkingchr1s/prntbtlr

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md)." > RELEASE_NOTES.md
          fi
          {
            echo
            echo "### Container image"
            echo '```'
            echo "docker pull ${IMAGE}:${version}"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
