<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="PrntBtlr — your Raspberry Pi print and scan butler">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141c2e"/>
      <stop offset="0.55" stop-color="#0f1420"/>
      <stop offset="1" stop-color="#0b0f18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#1e2a44" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0f1420" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="340" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="22" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="338" rx="21" fill="none" stroke="#2a3550" stroke-width="1.5"/>

  <!-- Printer mark -->
  <g transform="translate(74,96)" filter="url(#soft)">
    <rect x="18" y="6" width="84" height="42" rx="7" fill="url(#accent)"/>
    <rect x="4" y="40" width="112" height="66" rx="14" fill="#222d44" stroke="#2a3550" stroke-width="3"/>
    <rect x="26" y="78" width="68" height="46" rx="6" fill="#e7ecf5"/>
    <circle cx="96" cy="60" r="6.5" fill="#34d399"/>
    <rect x="34" y="88" width="52" height="5" rx="2.5" fill="#93a0bd"/>
    <rect x="34" y="100" width="40" height="5" rx="2.5" fill="#c2ccdf"/>
  </g>

  <!-- Wordmark -->
  <text x="228" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#e7ecf5" letter-spacing="1">PrntBtlr</text>
  <text x="230" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="27" font-weight="500" fill="#93a0bd">Your Raspberry&#160;Pi print &amp; scan butler</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(230,232)">
      <rect width="150" height="44" rx="22" fill="#1b2436" stroke="#2a3550"/>
      <circle cx="26" cy="22" r="5" fill="#4f8cff"/>
      <text x="44" y="29" fill="#c2ccdf">AirPrint</text>
    </g>
    <g transform="translate(392,232)">
      <rect width="188" height="44" rx="22" fill="#1b2436" stroke="#2a3550"/>
      <circle cx="26" cy="22" r="5" fill="#34d399"/>
      <text x="44" y="29" fill="#c2ccdf">Button&#160;scan</text>
    </g>
    <g transform="translate(592,232)">
      <rect width="238" height="44" rx="22" fill="#1b2436" stroke="#2a3550"/>
      <circle cx="26" cy="22" r="5" fill="#fbbf24"/>
      <text x="44" y="29" fill="#c2ccdf">Web control panel</text>
    </g>
  </g>

  <!-- Flow diagram (right side) -->
  <g transform="translate(852,74)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- clients -->
    <g transform="translate(0,0)">
      <rect width="80" height="52" rx="10" fill="#1b2436" stroke="#2a3550" stroke-width="1.5"/>
      <text x="40" y="32" text-anchor="middle" font-size="26">💻</text>
    </g>
    <g transform="translate(0,68)">
      <rect width="80" height="52" rx="10" fill="#1b2436" stroke="#2a3550" stroke-width="1.5"/>
      <text x="40" y="32" text-anchor="middle" font-size="26">📱</text>
    </g>
    <!-- pi (raspberry logo) -->
    <g transform="translate(120,34)">
      <rect width="86" height="86" rx="14" fill="#2b3c63" stroke="#4f8cff" stroke-width="2"/>
      <!-- leaves -->
      <g fill="#6cc04a">
        <ellipse cx="37" cy="23" rx="9.5" ry="4.6" transform="rotate(-32 37 23)"/>
        <ellipse cx="49" cy="23" rx="9.5" ry="4.6" transform="rotate(32 49 23)"/>
      </g>
      <!-- drupelets -->
      <g fill="#d1275b">
        <circle cx="38" cy="33" r="5"/><circle cx="48" cy="33" r="5"/>
        <circle cx="33" cy="41" r="5"/><circle cx="43" cy="41" r="5"/><circle cx="53" cy="41" r="5"/>
        <circle cx="38" cy="49" r="5"/><circle cx="48" cy="49" r="5"/>
      </g>
      <g fill="#ec6a93">
        <circle cx="36.4" cy="31.4" r="1.6"/><circle cx="46.4" cy="31.4" r="1.6"/>
        <circle cx="31.4" cy="39.4" r="1.6"/><circle cx="41.4" cy="39.4" r="1.6"/><circle cx="51.4" cy="39.4" r="1.6"/>
        <circle cx="36.4" cy="47.4" r="1.6"/><circle cx="46.4" cy="47.4" r="1.6"/>
      </g>
      <text x="43" y="73" text-anchor="middle" font-size="14" font-weight="700" fill="#e7ecf5">Pi</text>
    </g>
    <!-- printer -->
    <g transform="translate(232,42)">
      <rect width="80" height="70" rx="12" fill="#1b2436" stroke="#2a3550" stroke-width="1.5"/>
      <text x="40" y="46" text-anchor="middle" font-size="30">🖨️</text>
    </g>
    <!-- arrows -->
    <g stroke="url(#accent)" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M84 26 L116 60"/>
      <path d="M84 94 L116 84"/>
      <path d="M208 77 L228 77"/>
    </g>
  </g>
</svg>
